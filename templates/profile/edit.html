{% extends 'base.html' %}
{% block title %}Редактировать профиль{% endblock %}
{% block content %}
<h3 class="mb-4">Редактировать профиль</h3>
{% set p = current_user.profile %}
<div class="card"><div class="card-body"><form method="post"><div class="row g-3">
  {% if p and p.last_name is defined %}
  <div class="col-md-4"><label class="form-label">Фамилия</label><input type="text" class="form-control" name="last_name" value="{{ p.last_name }}"></div>
  <div class="col-md-4"><label class="form-label">Имя</label><input type="text" class="form-control" name="first_name" value="{{ p.first_name }}"></div>
  <div class="col-md-4"><label class="form-label">Отчество</label><input type="text" class="form-control" name="middle_name" value="{{ p.middle_name or '' }}"></div>
  {% endif %}
  {% if p %}<div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" value="{{ p.email or '' }}"></div>{% endif %}
  <div class="col-12"><button type="submit" class="btn btn-primary">Сохранить</button> <a href="{{ url_for('profile.index') }}" class="btn btn-outline-secondary">Отмена</a></div>
</div></form></div></div>
{% endblock %}
