{% extends 'base.html' %}
{% block title %}Загрузить результат{% endblock %}
{% block content %}
<h3 class="mb-4">Загрузить результат — {{ task.title }}</h3>
<div class="card"><div class="card-body">
<form method="post"><div class="mb-3"><label class="form-label">Описание результата</label><textarea class="form-control" name="content" rows="5" required></textarea></div>
<button type="submit" class="btn btn-primary">Отправить</button> <a href="{{ url_for('execution.task_view', tid=task.id) }}" class="btn btn-outline-secondary">Отмена</a>
</form></div></div>
{% endblock %}
