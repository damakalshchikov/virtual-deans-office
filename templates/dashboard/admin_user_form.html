{% extends 'base.html' %}
{% block title %}Создать пользователя{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <i class="fa-solid fa-user-plus me-2"></i>Новый пользователь
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" class="form-control" name="login" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Роль</label>
            <select class="form-select" name="role">
              {% set role_labels = {'student': 'Студент', 'curator': 'Куратор',
                                     'teacher': 'Преподаватель', 'admin': 'Администратор'} %}
              {% for r in roles %}
                <option value="{{ r }}">{{ role_labels[r] }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{{ url_for('dashboard.admin_users') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
